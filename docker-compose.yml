services:
  vercises-client:
    restart: unless-stopped
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
      - ./exercises:/app/client/public
    expose:
      - "5173"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.myapp.rule=PathPrefix(`/exercises`)"
      - "traefik.http.routers.myapp.entrypoints=web"
      - "traefik.http.services.myapp.loadbalancer.server.port=5173"
    command: ["sh", "-c", "npm install && npm run dev"]
  vercises-server:
    restart: unless-stopped
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
      - ./exercises:/app/exercises
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vercisesserver.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.vercisesserver.entrypoints=web"
      - "traefik.http.services.vercisesserver.loadbalancer.server.port=3000"
    expose:
      - "3000"
    # ports:
    #   - "3000:3000"
    command: ["sh", "-c", "npm install && npm run dev"]
    networks:
      - proxy

networks:
  proxy:
    external: true